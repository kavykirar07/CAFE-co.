<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Reservations | CAFE co.</title>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap-grid.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./scss/main.scss">
  <style>
    .form-control {
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--grain);
      color: var(--cream);
      border-radius: 0;
      padding-left: 0;
      font-family: var(--font-body);
    }
    .form-control:focus {
      outline: none;
      box-shadow: none;
      border-color: var(--burn);
    }
    select.form-control {
      appearance: none;
      background: var(--void);
      color: var(--cream);
    }
    .form-group { margin-bottom: 2rem; position: relative; }
    .form-label { position: absolute; top: -1.5rem; font-size: 0.8rem; color: var(--chalk); }
  </style>
</head>
<body style="padding-top: 100px;">

  <!-- Navigation -->
  <nav class="site-nav scrolled">
    <a href="index.html" class="logo">CAFE co.</a>
    <div class="nav-links">
      <a href="#">About</a>
      <a href="menu.html">Menu</a>
      <a href="#">Shop</a>
    </div>
    <a href="reservations.html" class="btn-brutal btn-primary">Reserve a Table</a>
  </nav>

  <!-- Content -->
  <div class="container py-5">
    <div class="row">
      <div class="col-5">
        <h1 class="hero-title" style="font-size: clamp(60px, 8vw, 150px); left: 0;">RESERVE<br>YOUR<br>SPACE.</h1>
        <p class="accent-text mt-4">Secure your ritual.</p>
        <div class="mt-5">
          <img src="https://images.unsplash.com/photo-1554118811-1e0d58224f24?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" alt="Tables" class="img-brutalist" style="--ar: 4/5;">
        </div>
      </div>
      
      <div class="col-6 offset-1 pt-5">
        <form id="reservation-form" class="mt-5">
          
          <!-- Step 1 -->
          <h3 class="editorial-header mb-4">1. Details</h3>
          <div class="row">
            <div class="col-6 form-group">
              <label class="form-label">Date</label>
              <input type="date" class="form-control w-100" id="res-date" required>
            </div>
            <div class="col-6 form-group">
              <label class="form-label">Time</label>
              <input type="time" class="form-control w-100" id="res-time" required>
            </div>
          </div>
          
          <div class="row">
            <div class="col-6 form-group">
              <label class="form-label">Guests</label>
              <input type="number" class="form-control w-100" id="res-guests" min="1" max="20" value="2" required>
            </div>
            <div class="col-6 form-group">
              <label class="form-label">Location</label>
              <select class="form-control w-100" id="res-location" required>
                <option value="Indoor">Indoor</option>
                <option value="Bar">Bar</option>
                <option value="Patio">Patio</option>
                <option value="Private Room">Private Room</option>
              </select>
            </div>
          </div>
          
          <div class="mb-5">
            <button class="btn-brutal" id="btn-check-avail">Check Availability</button>
            <div id="res-message" class="mt-3 accent-text"></div>
          </div>

          <!-- Step 2 -->
          <div id="res-step-2" class="d-none">
            <h3 class="editorial-header mb-4">2. Your Information</h3>
            <div class="form-group mt-4">
              <label class="form-label">Full Name</label>
              <input type="text" class="form-control w-100" id="res-name" required>
            </div>
            <div class="row">
              <div class="col-6 form-group mt-4">
                <label class="form-label">Email</label>
                <input type="email" class="form-control w-100" id="res-email" required>
              </div>
              <div class="col-6 form-group mt-4">
                <label class="form-label">Phone</label>
                <input type="tel" class="form-control w-100" id="res-phone">
              </div>
            </div>
            <div class="form-group mt-4">
              <label class="form-label">Special Notes</label>
              <input type="text" class="form-control w-100" id="res-notes">
            </div>
            
            <button type="submit" class="btn-brutal btn-primary w-100 text-center mt-4" style="display: block;">Confirm Booking</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="./js/cursor.js"></script>
  <script src="./js/forms.js"></script>
</body>
</html>
