<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Shop | CAFE co.</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap"
    rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap-grid.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./css/main.css">
  <style>
    .shop-card {
      border: 1px solid var(--grain);
      padding: 2rem;
      text-align: center;
      transition: all var(--transition-fast);
      position: relative;
    }

    .shop-card:hover {
      border-color: var(--burn);
      transform: translateY(-5px);
    }

    .shop-card img {
      width: 100%;
      aspect-ratio: 1/1;
      object-fit: cover;
      margin-bottom: 2rem;
      filter: grayscale(100%);
      transition: filter var(--transition-fast);
    }

    .shop-card:hover img {
      filter: grayscale(0%);
    }

    .badge {
      position: absolute;
      top: 1rem;
      left: 1rem;
      background: var(--burn);
      color: var(--cream);
      font-family: var(--font-accent);
      padding: 0.2rem 0.5rem;
      font-size: 0.8rem;
    }
  </style>
</head>

<body style="padding-top: 100px;">

  <nav class="site-nav scrolled">
    <a href="index.html" class="logo">CAFE co.</a>
    <div class="nav-links">
      <a href="about.html">About</a>
      <a href="menu.html">Menu</a>
      <a href="shop.html" class="active">Shop</a>
    </div>
    <a href="reservations.html" class="btn-brutal btn-primary">Reserve a Table</a>
  </nav>

  <div class="container py-5">
    <h1 class="hero-title" style="font-size: clamp(60px, 8vw, 150px); left: 0;">HARDWARE<br>& BEANS.</h1>

    <div class="row mt-5" id="shop-grid">
      <!-- Loaded via JS -->
    </div>
  </div>

  <script src="./js/cursor.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const grid = document.getElementById('shop-grid');
      try {
        const res = await fetch('http://localhost:3001/api/menu'); // The route handles both, shop is separate endpoint?
        // Wait, the API for shop is /api/menu/shop. Let's fetch that.
        const res2 = await fetch('http://localhost:3001/api/menu/shop');
        const items = await res2.json();

        grid.innerHTML = '';
        items.forEach(item => {
          const col = document.createElement('div');
          col.className = 'col-12 col-md-6 col-lg-4 mb-4';
          col.innerHTML = `
            <div class="shop-card">
              ${item.badge ? `<div class="badge">${item.badge}</div>` : ''}
              <img src="${item.image_url}" alt="${item.name}">
              <h3 class="font-editorial">${item.name}</h3>
              <p class="accent-text text-muted mb-4">${item.description}</p>
              <div class="d-flex justify-content-between align-items-center">
                <span class="font-accent text-white">₹${item.price}</span>
                <button class="btn-brutal">Add to Cart</button>
              </div>
            </div>
          `;
          grid.appendChild(col);
        });
      } catch (err) {
        grid.innerHTML = '<p class="text-danger">Error loading shop.</p>';
      }
    });
  </script>
</body>

</html>
