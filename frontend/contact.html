<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Contact | CAFE co.</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap"
    rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap-grid.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./css/main.css">
  <style>
    .form-control {
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--grain);
      color: var(--cream);
      border-radius: 0;
      padding: 0;
      font-family: var(--font-body);
      transition: border-color var(--transition-fast);
      width: 100%;
    }

    .form-control:focus {
      outline: none;
      border-color: var(--burn);
    }

    .input-group {
      position: relative;
      margin-bottom: 3rem;
    }

    .input-group label {
      position: absolute;
      top: 0;
      left: 0;
      font-family: var(--font-accent);
      font-size: 0.85rem;
      color: var(--chalk);
      pointer-events: none;
      transition: all var(--transition-fast);
    }

    .input-group input:focus+label,
    .input-group input:not(:placeholder-shown)+label,
    .input-group textarea:focus+label,
    .input-group textarea:not(:placeholder-shown)+label {
      transform: translateY(-20px);
      font-size: 0.75rem;
      color: var(--burn);
    }

    .input-group input,
    .input-group textarea {
      padding-top: 10px;
    }
  </style>
</head>

<body style="padding-top: 100px;">

  <nav class="site-nav scrolled">
    <a href="index.html" class="logo">CAFE co.</a>
    <div class="nav-links">
      <a href="about.html">About</a>
      <a href="menu.html">Menu</a>
      <a href="shop.html">Shop</a>
    </div>
    <a href="reservations.html" class="btn-brutal btn-primary">Reserve a Table</a>
  </nav>

  <div class="container py-5">
    <div class="row align-items-center">
      <div class="col-12 col-md-5">
        <h1 class="hero-title" style="font-size: clamp(60px, 8vw, 150px); left: 0;">REACH<br>OUT.</h1>
        <p class="accent-text mt-4 text-muted">Scheme 54, PU4<br>Vijay Nagar, Indore</p>
        <div class="mt-5">
          <img
            src="https://images.unsplash.com/photo-1497935586351-b67a49e012bf?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80"
            alt="Abstract" class="img-brutalist" style="aspect-ratio: 1/1;">
        </div>
      </div>

      <div class="col-12 col-md-6 offset-md-1 pt-5">
        <form id="contact-form">
          <h3 class="editorial-header mb-5">Transmit a Message</h3>

          <div class="input-group">
            <input type="text" id="c-name" class="form-control" placeholder=" " required>
            <label>Full Name</label>
          </div>

          <div class="row">
            <div class="col-6 input-group">
              <input type="email" id="c-email" class="form-control" placeholder=" " required>
              <label>Email Address</label>
            </div>
            <div class="col-6 input-group">
              <input type="tel" id="c-phone" class="form-control" placeholder=" ">
              <label>Phone (Optional)</label>
            </div>
          </div>

          <div class="input-group">
            <input type="text" id="c-subject" class="form-control" placeholder=" " required>
            <label>Subject</label>
          </div>

          <div class="input-group">
            <textarea id="c-message" class="form-control" rows="4" placeholder=" " required></textarea>
            <label>Your Message</label>
          </div>

          <button type="submit" class="btn-brutal btn-primary">Send Message</button>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="./js/cursor.js"></script>
  <script src="./js/forms.js"></script>
</body>

</html>
